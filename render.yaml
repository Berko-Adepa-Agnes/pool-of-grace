# Render.com deployment configuration
# This file enables one-click deployment on Render

databases:
  - name: poolofgrace-db
    plan: free
    databaseName: poolofgrace
    user: poolofgrace_user

services:
  - type: web
    name: pool-of-grace
    plan: free
    runtime: node
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install
    startCommand: cd backend && node seed.js && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: poolofgrace-db
          property: connectionString
      - key: REACT_APP_API_URL
        value: /api

# Render.com deployment configuration
# This file enables one-click deployment on Render



services:
  - type: web
    name: pool-of-grace
    plan: free
    runtime: node
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install
    startCommand: cd backend && node seed.js && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false # Set this manually in the Render dashboard!
      - key: REACT_APP_API_URL
        value: /api
      - key: FRONTEND_URL
        value: https://pool-of-grace.onrender.com

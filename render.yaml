services:
  - type: web
    name: pool-of-grace
    env: node
    autoDeploy: true
    buildCommand: npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CI
        value: false
